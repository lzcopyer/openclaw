use_default_settings: true

general:
  debug: false
  instance_name: "SearXNG"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: ""
  formats:
    - html
    - json
    - csv
    - rss

server:
  secret_key: "searxng-local-secret-key-12345"
  limiter: false
  image_proxy: false
  default_http_headers:
    X-Forwarded-For: "127.0.0.1"

ui:
  default_theme: simple
  default_locale: ""
  query_in_title: true
  infinite_scroll: true

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: bing
    engine: bing
    shortcut: bi
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false
